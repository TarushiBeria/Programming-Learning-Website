  <div class="container mt-5 pt-5 formm">
    <h5 class="my-3">Query Form</h5>
    <form action="" onsubmit="return formValidator()">
      <div class="row">
        <div class="col-6 input selectt">
          <select name="" id="language">
            <option value="">Select the language</option>
            <option value="Course 1">Course 1</option>
            <option value="Course 2">Course 2</option>
            <option value="Course 3">Course 3</option>
            <option value="Course 4">Course 4</option>
          </select>
        </div>
        <div class="col-6 img input ms-2">
          <label for="">Upload an image: </label>
          <input type="file" id="img">
        </div>
        <div class="col-12 input textt mt-2">
          <textarea name="" rows="4" cols="50" placeholder="Enter the query" id="query"></textarea>
        </div>
      </div>
      <div class="row subb mt-2">
        <button type="submit" class="py-2">Submit</button>
      </div>
    </form>
  </div>
</body>
<script>
  function formValidator(){
    var language = document.getElementById("language");
    var img = document.getElementById("img");
    var query = document.getElementById("query");
    
    if(notSelect(language, "Please select the language")){
      if(checkImg(img, "Please select a file with .jpg or .png extension")){
        if(isEmpty(query, "Please enter the query within the length of 5 to 100 characters")){
          return true;
        }
      }
    }
    return false;

    function notSelect(elem, helperMsg){
      if(elem.value==""){
        alert("Please select the language");
        elem.focus();
        return false;
      }
      else{
        return true;
      }
    }

    function checkImg(elem, helperMsg){
      if(elem.value.endsWith(".jpg") || elem.value.endsWith(".png") || elem.value == ""){
        return true;
      }
      else{
        alert(helperMsg);
        elem.focus();
        return false;
      }
    }

    function isEmpty(elem, helperMsg){
      if(elem.value.length>=5 && elem.value.length<=100){
        return true;
      }
      else{
        alert(helperMsg);
        elem.focus();
        return false;
      }
    }
  }
</script>
